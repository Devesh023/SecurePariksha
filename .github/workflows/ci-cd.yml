name: SecurePariksha CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    name: Backend Build & Compile Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Validate Prisma Schema
      run: |
        cd backend
        npx prisma validate

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Compile Backend TypeScript
      run: |
        cd backend
        npm run build

  frontend-checks:
    name: Frontend Build & Compile Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Download AI Model weights
      run: |
        cd frontend
        node scripts/download-models.js

    - name: Compile & Build Frontend
      run: |
        cd frontend
        npm run build
